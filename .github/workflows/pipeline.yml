name: Orion CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ---------------------------------------------------------
  # JOB 1 : Tests du Front-end (Angular)
  # ---------------------------------------------------------
  frontend-test:
    name: Front-end Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./front
    steps:
      - name: Récupération du code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Configuration de Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20

      - name: Installation propre des dépendances
        run: npm ci --ignore-scripts

      - name: Exécution des tests Angular
        run: npm run test:ci

      - name: Sauvegarder le fichier de rapport de tests
        uses: actions/upload-artifact@vbbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: lcov
          path: front/coverage/
          retention-days: 1

  # ---------------------------------------------------------
  # JOB 2 : Tests du Back-end (Spring Boot)
  # ---------------------------------------------------------
  backend-test:
    name: Back-end Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./back
    steps:
      - name: Récupération du code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Configuration de Java 17 (Temurin)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 17
          distribution: "temurin"

      - name: Ajout des droits d'exécution au wrapper Gradle
        run: chmod +x ./gradlew

      - name: Exécution des tests Spring Boot
        run: ./gradlew test jacocoTestReport

      - name: Sauvegarder le fichier de rapport de tests
        uses: actions/upload-artifact@vbbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: jacoco-report
          path: back/build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 1

  # ---------------------------------------------------------
  # JOB 3 : Analyse Qualité & Sécurité (SonarCloud)
  # ---------------------------------------------------------
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: ["frontend-test", "backend-test"]
    steps:
      - name: Récupération du code avec historique
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Configuration de Java 17 (Prérequis pour la compilation)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 17
          distribution: "temurin"

      - name: Téléchargement rapport Front
        uses: actions/download-artifact@v3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: lcov
          path: front/coverage/

      - name: Téléchargement rapport Back
        uses: actions/download-artifact@v3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: jacoco-report
          path: back/build/reports/jacoco/test/

      - name: Compilation du Back-end (Génération des .class)
        working-directory: ./back
        run: |
          chmod +x ./gradlew
          ./gradlew classes

      - name: Analyse SonarCloud (v6)
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=apalermo
            -Dsonar.projectKey=apalermo_orion-crm
            -Dsonar.java.binaries=back/build/classes
            -Dsonar.javascript.lcov.reportPaths=front/coverage/**/lcov.info
            -Dsonar.coverage.jacoco.xmlReportPaths=back/build/reports/jacoco/test/jacocoTestReport.xml
            -Dsonar.exclusions=**/build/**,**/dist/**,**/node_modules/**,front/coverage/**

  # ---------------------------------------------------------
  # JOB 4 : Livraison (Docker Hub)
  # ---------------------------------------------------------
  docker-delivery:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test, sonarcloud]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ops/setup-docker-push'

    steps:
      - name: Récupération du code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Connexion à Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Back-end
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: ./back
          file: ./back/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/orion-crm-back:latest

      - name: Build & Push Front-end
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: ./front
          file: ./front/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/orion-crm-front:latest
