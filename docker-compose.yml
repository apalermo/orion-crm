services:
  backend:
    build:
      context: ./back
    ports:
      - "8080:8080"
    networks:
      - orion-network
    environment:
      - SPRING_PROFILES_ACTIVE=dev
  frontend:
    build:
      context: ./front
    ports:
      - "4200:8080"
    networks:
      - orion-network
    depends_on:
      - backend

networks:
  orion-network:
    driver: bridge
